name: Run Notepad++ Verification Tests

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t npp-test-runner .

      - name: Run Base Tests (Regression)
        run: |
          docker run --rm --network none -v ${{ github.workspace }}:/app npp-test-runner ./test.sh --output_path /app/base_results.xml base

      - name: Run New Tests (Verification)
        run: |
          docker run --rm --network none -v ${{ github.workspace }}:/app npp-test-runner ./test.sh --output_path /app/new_results.xml new

      - name: Publish Test Results
        uses: actions/upload-artifact@v3
        with:
          name: junit-reports
          path: |
            base_results.xml
            new_results.xml
